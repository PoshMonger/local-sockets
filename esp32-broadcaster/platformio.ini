; ESP32-CAM broadcaster for sockets-2.0 device API
; Open this folder in Cursor and use PlatformIO to build/upload

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
lib_deps = 
    espressif/esp32-camera@^2.0.0

; Optional: use a different ESP32 board (e.g. generic dev board)
; [env:esp32dev]
; platform = espressif32
; board = esp32dev
; framework = arduino
; monitor_speed = 115200
