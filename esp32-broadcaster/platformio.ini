; ESP32-CAM broadcaster for sockets-2.0 device API
; Open this folder in Cursor and use PlatformIO to build/upload
;
; Select ONE environment for your board:
;   esp32cam     = AI-Thinker ESP32-CAM (original ESP32)
;   esp32s3eye   = Espressif ESP32-S3-EYE / ESP32-S3 Sense (S3 + OV2640 + LCD)
;   xiao_esp32s3 = Seeed XIAO ESP32S3 Sense (small S3 + OV2640 + mic)

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/load_env.py
lib_deps = 
    espressif/esp32-camera@^2.0.0

; Espressif ESP32-S3-EYE (often sold as "ESP32-S3 Sense")
[env:esp32s3eye]
platform = espressif32
board = esp32s3camlcd
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/load_env.py
build_flags = -DCAMERA_MODEL_ESP32S3_EYE
lib_deps = 
    espressif/esp32-camera@^2.0.0
board_build.flash_mode = qio
board_build.boot = qspi

; Seeed XIAO ESP32S3 Sense (compact S3 + camera + mic)
[env:xiao_esp32s3]
upload_port = /dev/cu.usbmodem*
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/load_env.py
build_flags = -DCAMERA_MODEL_XIAO_ESP32S3
lib_deps = 
    espressif/esp32-camera@^2.0.0
