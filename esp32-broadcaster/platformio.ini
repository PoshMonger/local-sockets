; ESP32-CAM broadcaster for sockets-2.0 device API
; Open this folder in Cursor and use PlatformIO to build/upload
;
; Select ONE environment for your board:
;   esp32cam     = AI-Thinker ESP32-CAM (original ESP32)
;   esp32s3eye   = Espressif ESP32-S3-EYE / ESP32-S3 Sense (S3 + OV2640 + LCD)
;   xiao_esp32s3 = Seeed XIAO ESP32S3 Sense (small S3 + OV2640 + mic)

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/load_env.py
lib_deps = 
    espressif/esp32-camera@^2.0.0

; Espressif ESP32-S3-EYE (often sold as "ESP32-S3 Sense")
[env:esp32s3eye]
platform = espressif32
board = esp32s3camlcd
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/load_env.py
build_flags = -DCAMERA_MODEL_ESP32S3_EYE
lib_deps = 
    espressif/esp32-camera@^2.0.0
board_build.flash_mode = qio
board_build.boot = qspi

; Seeed Studio XIAO ESP32-S3 Sense (S3 + OV2640 camera + PSRAM + mic)
; Board: https://www.seeedstudio.com/XIAO-ESP32S3-Sense-p-5639.html
; Uses native USB (no separate USB-UART); upload over the same USB port.
; If upload says "Please specify upload_port": plug in the board,
;set to bootloader mode by holding the button down while plugging in or pressing Upload, then release after upload starts.

[env:xiao_esp32s3_sense]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; USB CDC — required for Serial to work over native USB
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCAMERA_MODEL_XIAO_ESP32S3

; Upload settings
upload_protocol = esptool
upload_speed = 460800
upload_port = /dev/cu.usbmodem101

; Monitor settings
monitor_speed = 115200
monitor_port = /dev/cu.usbmodem101

; Libraries
lib_deps =
    espressif/esp32-camera@^2.0.0

; Environment variable loader (keep if your project uses .env)
extra_scripts = pre:scripts/load_env.py

