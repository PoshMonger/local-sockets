<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stream</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0f0f12;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 1.5rem; }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 420px;
      width: 100%;
    }
    a {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      color: #fff;
    }
    a.broadcast { background: #22c55e; }
    a.broadcast:hover { background: #16a34a; }
    a.watch { background: #3b82f6; }
    a.watch:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Stream</h1>
    <p style="margin:0 0 1rem; color:#a1a1aa;">Any device can broadcast or watch.</p>
    <a class="broadcast" href="/broadcast.html">Create stream (broadcast)</a>
    <a class="watch" href="/watch.html">Watch stream</a>
  </div>
</body>
</html>
